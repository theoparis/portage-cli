[package]
name = "portage-cli"
version = "0.1.0"
edition = "2024"
rust-version = "1.85"
authors = ["Luca Barbato <lu_zero@gentoo.org>"]
license = "MIT"
description = "Gentoo Portage command-line tools (em)"
repository = "https://github.com/lu-zero/portage-cli"
keywords = ["gentoo", "portage", "cli", "package-manager"]
categories = ["command-line-utilities", "development-tools"]

[[bin]]
name = "em"
path = "src/main.rs"

[dependencies]
portage-atom = "0.8"
clap = { version = "4", features = ["derive"] }
tokio = { version = "1", features = ["rt-multi-thread", "macros"] }
thiserror = "2"

[profile.release]
opt-level = 3
lto = true
codegen-units = 1
